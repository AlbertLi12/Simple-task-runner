services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: finance-agent-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-agent-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
